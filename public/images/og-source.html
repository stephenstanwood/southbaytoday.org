<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1200px;
    height: 630px;
    font-family: 'Inter', system-ui, sans-serif;
    background:
      linear-gradient(135deg, rgba(255,123,43,0.16), rgba(244,63,124,0.12) 34%, rgba(135,56,245,0.14) 68%, rgba(34,198,211,0.18)),
      #fff8f2;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    position: relative;
    overflow: hidden;
  }
  .strip {
    position: absolute;
    top: 0;
    left: 0;
    right: 0;
    height: 14px;
    background: linear-gradient(90deg, #ff7b2b, #f43f7c, #8738f5, #22c6d3, #ffd338);
  }
  .mark {
    width: 170px;
    height: 170px;
    border-radius: 50%;
    background: #fff;
    border: 7px solid #fff;
    box-shadow: 0 22px 60px rgba(31, 12, 73, 0.18);
    margin-bottom: 28px;
  }
  .title {
    font-family: Georgia, 'Times New Roman', serif;
    font-size: 76px;
    font-weight: 900;
    color: #12062f;
    letter-spacing: -1px;
    line-height: 1;
    margin-bottom: 14px;
  }
  .subtitle {
    font-size: 28px;
    font-weight: 700;
    color: #5f5870;
    margin-bottom: 34px;
  }
  .scope {
    max-width: 720px;
    text-align: center;
    font-size: 22px;
    font-weight: 800;
    line-height: 1.35;
    color: #12062f;
    opacity: 0.78;
  }
  .url {
    position: absolute;
    bottom: 32px;
    font-size: 18px;
    font-weight: 900;
    color: #8738f5;
    letter-spacing: 1px;
    text-transform: uppercase;
  }
</style>
</head>
<body>
  <div class="strip"></div>
  <img class="mark" src="./sbt-newsletter-avatar.png" alt="">
  <div class="title">South Bay Today</div>
  <div class="subtitle">What should we do today?</div>
  <div class="scope">Day plans, events, restaurants, parks, civic notes, and local conversation across the South Bay.</div>
  <div class="url">southbaytoday.org</div>
</body>
</html>
