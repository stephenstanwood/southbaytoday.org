name: Refresh Events

on:
  schedule:
    # Daily at 10:17 PM PDT / 9:17 PM PST, ahead of the 3:20 AM Mini plan refresh.
    # The off-hour minute leaves a wide buffer for scheduler delays.
    - cron: "17 5 * * *"
  workflow_dispatch: # allow manual trigger

concurrency:
  group: refresh-events-main
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Generate events
        env:
          SBT_STRICT_EVENT_REFRESH: "1"
          TICKETMASTER_API_KEY: ${{ secrets.TICKETMASTER_API_KEY }}
          MEETUP_CLIENT_ID: ${{ secrets.MEETUP_CLIENT_ID }}
          MEETUP_MEMBER_ID: ${{ secrets.MEETUP_MEMBER_ID }}
          MEETUP_KID: ${{ secrets.MEETUP_KID }}
          MEETUP_PRIVATE_KEY: ${{ secrets.MEETUP_PRIVATE_KEY }}
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: node scripts/generate-events.mjs

      - name: Commit updated events
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data/south-bay
          git diff --staged --quiet || git commit -m "chore: refresh upcoming events"
          git push
